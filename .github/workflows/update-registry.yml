name: Notify registry update

on:
  push:
    branches: [main]
    paths:
      - "registry/**/*.json"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SecID-Service registry upload
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SECID_TO_SERVICE_DISPATCH }}
          repository: CloudSecurityAlliance/SecID-Service
          event-type: registry-updated
          client-payload: '{"ref": "${{ github.sha }}"}'
