name: "🏢 Add an organization or product (entity)"
description: "Add an organization, product, service, AI model, or dataset to the SecID entity registry. Short form — name and domain are the essentials."
title: "[entity] <name>"
labels: ["submission", "entity"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to add an **organization** (company, government body, standards org, non-profit, university), a **product**, a **service**, an **AI model**, or a **dataset**.

        You only really need a **name** and a **domain** — everything else is optional and helps us file it correctly.
  - type: input
    id: name
    attributes:
      label: Name
      description: "Official name of the organization, product, service, model, or dataset."
      placeholder: "Example Security, Inc."
    validations:
      required: true
  - type: input
    id: domain
    attributes:
      label: Primary domain
      description: "The canonical website domain. This becomes the SecID namespace."
      placeholder: "example.com"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: What kind of thing is this?
      options:
        - "Organization — a company"
        - "Organization — government / public sector"
        - "Organization — standards body"
        - "Organization — non-profit / foundation"
        - "Organization — academic / research"
        - "Organization — industry consortium"
        - "Product"
        - "Service (incl. cloud)"
        - "AI / ML model"
        - "Dataset"
        - "Not sure"
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent organization
      description: "If this is a product/service/model/cloud arm, what company owns it? (e.g. Amazon Web Services → Amazon.com, Inc.)"
      placeholder: "Example Holdings, Inc."
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Brief description
      description: "Optional — one line on what they do / what it is."
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: "I checked the [live resolver](https://secid.cloudsecurityalliance.org/) and this isn't already listed."
          required: true
        - label: "I understand the SecID registry is dedicated to the public domain under [CC0 1.0](https://github.com/CloudSecurityAlliance/SecID/blob/main/LICENSE)."
          required: true
