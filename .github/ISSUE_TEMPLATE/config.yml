# Keep blank issues available (Discussions is not enabled on this repo), but
# present the structured submission forms first — they capture the fields a
# maintainer needs to turn a submission into a registry entry.
blank_issues_enabled: true
contact_links:
  - name: 📖 Read the spec & registry docs first
    url: https://github.com/CloudSecurityAlliance/SecID#readme
    about: How SecID works, the registry format, and what each of the 10 types means. Skim before submitting.
  - name: 🔎 Try the live resolver
    url: https://secid.cloudsecurityalliance.org/
    about: Check whether the thing you want to add already resolves before opening a submission.
